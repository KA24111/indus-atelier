<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="icon" href="images/tictactoe-icon.png" type="image/png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe - Play</title>
    <link rel="stylesheet" href="styles/game.css">
</head>

<body>

<header>
    <h1>Tic Tac Toe</h1>
</header>

<nav>
    <a href="index.html"><img src="images/tictactoe-icon.png" alt="Home"></a>
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>
        <a href="privacypolicy.html">Privacy Policy</a>
    </div>
    <div class="hamburger" onclick="toggleMenu()">☰</div>
</nav>

<main>
    <h2 id="mode-title">Game Mode</h2>

    <div class="board" id="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>
        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>
        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
    </div>

    <p id="status">Your move!</p>
    <p id="timer" style="display:none;">Time left: 5s</p>

    <button id="restartBtn">Restart</button>
</main>

<footer>
    <p>&copy; 2026 Indus Atelier – All rights reserved</p>
</footer>

<script>
function toggleMenu() {
    const navLinks = document.getElementById('navLinks');
    if (navLinks) {
        navLinks.classList.toggle('show');
    }
}
</script>

<script src="game.js"></script>

</body>
</html>
